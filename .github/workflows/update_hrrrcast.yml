name: Update HRRRCast Hodograph Map

on:
  schedule:
    # Runs at minute 20 of every hour
    - cron: '20 * * * *'
  workflow_dispatch:

# This permission block is CRITICAL so the default token is allowed to push code back
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        # Using the built-in GitHub token
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libeccodes0
        pip install xarray matplotlib cartopy metpy requests numpy cfgrib ecmwflibs

    - name: Run Plotting Script
      run: python plot_hrrrcast_hodographs.py

    - name: Commit and Push New Images
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Remove junk index files generated by cfgrib
        rm -f *.idx
        
        # Stage ALL changes (New images + Deletions of old images)
        git add -A
        
        # Check if there are actual changes before trying to commit
        if git diff --staged --quiet; then
          echo "No changes to commit."
        else
          # Commit the updates
          git commit -m "Auto-update HRRRCast plots for $(date -u)"
          
          # Safely pull and rebase in case of any concurrent updates
          git pull --rebase
          
          # Push the newly generated images back to your repository
          git push
        fi
