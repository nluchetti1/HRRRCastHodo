name: Update HRRRCast Hodograph Map

on:
  schedule:
    # Run at a random, off-peak minute to avoid GitHub server drops
    - cron: '13 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libeccodes0
        pip install xarray matplotlib cartopy metpy requests numpy cfgrib ecmwflibs

    - name: Run Plotting Script
      run: python plot_hrrrcast_hodographs.py

    - name: Commit and Push New Images
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Remove junk index files generated by cfgrib
        rm -f *.idx
        
        # Stage ALL changes (New images, config.js, deletions)
        git add -A
        
        if git diff --staged --quiet; then
          echo "No changes to commit."
        else
          git commit -m "Auto-update HRRRCast plots for $(date -u)"
          git pull --rebase
          git push
        fi
